# Build hf-bsh on a tag push (or manual dispatch), upload it to the GitHub
# release, and commit the binary back to `main` at the repo root so
# `hf extensions install torrid-fish/hf-bsh` can fetch it from
# `raw.githubusercontent.com/.../refs/heads/main/hf-bsh`.
#
# Only the linux-x86_64 build lands on `main` (that's the path `hf extensions
# install` hits). Release assets are tag-and-arch-suffixed so users on other
# platforms can still grab a binary from the release page.

name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to publish (e.g. v0.1.0). Must already point at the commit you want released.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-release:
    name: Build & release (linux-x86_64)
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="${{ inputs.tag }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Check out source at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --locked

      - name: Build release binary
        run: cargo build --release --locked --target x86_64-unknown-linux-gnu

      - name: Stage artefacts
        run: |
          set -euo pipefail
          mkdir -p dist
          install -m 0755 target/x86_64-unknown-linux-gnu/release/hf-bsh dist/hf-bsh
          cp dist/hf-bsh "dist/hf-bsh-${{ steps.tag.outputs.tag }}-x86_64-unknown-linux-gnu"

      - name: Create or update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: dist/hf-bsh-${{ steps.tag.outputs.tag }}-x86_64-unknown-linux-gnu

      - name: Publish binary to main for `hf extensions install`
        run: |
          set -euo pipefail
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin main
          git checkout -B main origin/main
          install -m 0755 dist/hf-bsh hf-bsh
          git add hf-bsh
          if git diff --cached --quiet; then
            echo "hf-bsh unchanged on main; skipping push."
            exit 0
          fi
          git commit -m "ci: publish hf-bsh binary for ${{ steps.tag.outputs.tag }} [skip ci]"
          git push origin main
